# diff Configuration.

check-thread-count = 4

export-fix-sql = true

check-struct-only = false

[task]
    output-dir = "/tmp/ticdc_dm_test/output"

    source-instances = ["mysql1"]

    target-instance = "tidb0"

    target-check-tables = ["fk_route_dst.parent_r", "fk_route_dst.child_r"]

[routes.parent-route]
schema-pattern = "fk_route_src"
table-pattern = "parent"
target-schema = "fk_route_dst"
target-table = "parent_r"

[routes.child-route]
schema-pattern = "fk_route_src"
table-pattern = "child"
target-schema = "fk_route_dst"
target-table = "child_r"

[data-sources]
[data-sources.mysql1]
host = "127.0.0.1"
port = 3306
user = "root"
password = "123456"
route-rules = ["parent-route", "child-route"]

[data-sources.tidb0]
host = "127.0.0.1"
port = 4000
user = "test"
password = "123456"
